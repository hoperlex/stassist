<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FBF7F0" />
    <title>Нет соединения — Зодиакум</title>
    <style>
      /* Самодостаточная страница: никаких ссылок на /assets/* (они могут быть не в кэше). */
      html, body { margin: 0; height: 100%; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; padding: 24px; box-sizing: border-box; text-align: center;
        font-family: 'Quicksand', 'Ubuntu', 'DejaVu Sans', sans-serif; color: #2A2540;
        background:
          radial-gradient(1000px 700px at 92% 4%, rgba(124,124,224,0.14), rgba(124,124,224,0) 58%),
          linear-gradient(178deg, #FBF7F0 0%, #F2EFFB 46%, #FBF4F3 100%);
      }
      .mark { width: 72px; height: 72px; margin-bottom: 22px; }
      h1 { font-family: 'P052', 'DejaVu Serif', serif; font-size: 26px; font-weight: 700; margin: 0 0 12px; }
      p { font-size: 16px; line-height: 1.6; color: #5E587A; max-width: 420px; margin: 0 0 26px; font-weight: 500; }
      button {
        font-family: inherit; font-weight: 600; font-size: 15px; color: #fff; cursor: pointer;
        border: 0; border-radius: 999px; padding: 12px 26px; min-height: 46px;
        background: linear-gradient(135deg, #8A86EC 0%, #6560CE 100%);
        box-shadow: 0 8px 20px rgba(101, 96, 206, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }
    </style>
  </head>
  <body>
    <svg class="mark" viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <circle cx="20" cy="20" r="18.5" stroke="#C8A24B" stroke-width="1.1" opacity="0.7" />
      <circle cx="20" cy="20" r="13" stroke="#7C7CE0" stroke-width="1.1" opacity="0.55" />
      <path d="M27 13.5a10 10 0 1 0 3.2 9.3A8 8 0 0 1 27 13.5Z" fill="#7C7CE0" />
      <circle cx="9.5" cy="27" r="1.4" fill="#C8A24B" />
    </svg>
    <h1>Нет соединения</h1>
    <p>Похоже, интернет пропал. Проверьте подключение и попробуйте снова — «Зодиакум» вернётся, как только связь восстановится.</p>
    <button type="button" onclick="location.reload()">Обновить</button>
  </body>
</html>
